name: Mobile Build

on:
  push:
    branches:
      - main
    tags:
      # Tag-based release: pushing mobile-v<semver> runs the test job AND the
      # EAS preview build (gated by the `if:` on build-preview below).
      # Matches the api-v* / cms-v* convention used by the deploy skill.
      #
      # NOTE: do NOT add a `paths:` filter under this `push:` event. GitHub
      # Actions applies `paths:` to BOTH branch and tag pushes when they share
      # a single `push:` trigger, which silently skips the workflow for tags
      # whose commit diff doesn't touch the filtered paths (e.g. tagging a
      # merge commit, a README edit, or a cherry-picked config-only change).
      # Tests run on EVERY main push and EVERY mobile-v* tag — that's the
      # always-on lint/typecheck/unit safety net.
      - 'mobile-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo typecheck --filter=@halo/mobile

      - name: Run tests
        run: pnpm --filter @halo/mobile test

      # Metro + Babel release-bundle dry-run. This runs the exact same
      # pipeline that EAS's :app:createBundleReleaseJsAndAssets task uses,
      # so phantom-dependency bugs (like the babel-preset-expo one this PR
      # fixes) are caught on every PR/main push — NOT only when a release
      # tag is cut. No APK is built and no EAS quota is consumed; just the
      # JS bundle is compiled to verify Metro resolves every module.
      #
      # Keep this in the `test` job (which runs on every push) so the
      # "continuous integration" safety net catches bundle-level regressions
      # without waiting for the tag-gated EAS build.
      - name: Verify release bundle compiles (Metro + Babel dry-run)
        env:
          NODE_ENV: production
        # --output-dir keeps the generated bundle out of apps/mobile/dist so the
        # workspace stays clean (matters when this same command is run locally
        # via the pre-push skill, not just in ephemeral CI runners).
        run: pnpm --filter @halo/mobile exec expo export --platform android --output-dir /tmp/expo-export-check

  build-preview:
    name: EAS Preview Build
    runs-on: ubuntu-latest
    needs: test
    # Only fire on a mobile-v<semver> tag push — not on every main push.
    # This matches the api-v* / cms-v* deploy pattern and avoids burning EAS
    # quota on changes that don't actually need a new preview APK.
    if: startsWith(github.ref, 'refs/tags/mobile-v')
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL_STAGING }}
    steps:
      - name: Check EAS prerequisites
        id: preflight
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::EAS build skipped — EXPO_TOKEN not configured. Set EXPO_TOKEN in repository secrets and run 'eas credentials --platform android' to store a keystore before enabling builds."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        if: steps.preflight.outputs.skip != 'true'
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.preflight.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        if: steps.preflight.outputs.skip != 'true'
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      # Android-only until iOS Developer Program enrollment and Apple credentials are set up.
      # To enable iOS: run `eas credentials --platform ios` then change to --platform all.
      - name: Build preview (Android)
        if: steps.preflight.outputs.skip != 'true'
        working-directory: apps/mobile
        run: eas build --profile preview --platform android --non-interactive
