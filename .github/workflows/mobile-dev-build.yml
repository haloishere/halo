name: Mobile Dev Build (Local)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
      profile:
        description: 'EAS build profile'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - e2e
          - preview

permissions:
  contents: read

jobs:
  build:
    name: Local EAS Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      BUILD_PLATFORM: ${{ inputs.platform }}
      BUILD_PROFILE: ${{ inputs.profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build locally
        working-directory: apps/mobile
        run: eas build --profile "$BUILD_PROFILE" --platform "$BUILD_PLATFORM" --local --non-interactive --output ./build-output.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-client-${{ inputs.profile }}-${{ inputs.platform }}
          path: apps/mobile/build-output.apk
          retention-days: 14
