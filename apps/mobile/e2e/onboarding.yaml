appId: com.halo.mobile
---
- launchApp

# Enter email screen
- assertVisible: "Enter your email"
- fillIn:
    id: "email-input"
    text: "test@example.com"
- tapOn: "Continue"

# OTP verification screen
- assertVisible: "Enter verification code"
# In E2E builds, OTP_TEST_MODE is enabled so any valid 6-digit code works
- fillIn:
    id: "otp-input"
    text: "123456"

# Onboarding — Step 1: Name
- assertVisible: "What's your name?"
- tapOn:
    accessibilityLabel: "Your name"
- inputText: "Alex"
- tapOn: "Continue"

# Onboarding — Step 2: City (Luzern is pre-selected; just confirm)
- assertVisible: "Where do you live?"
- assertVisible: "Luzern"
- tapOn: "Continue"

# Onboarding — Step 3: Consent guarantees
- assertVisible: "How Halo keeps your vault safe"
- assertVisible: "Only the agent reads your vault"
- tapOn:
    accessibilityLabel: "Finish onboarding"

# Landed on tabs (post-onboarding) — confirms no loop back to welcome
- assertVisible: "Portrait"
